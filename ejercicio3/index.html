<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <input type="text" class="nombre"/>
        <button class="btn">enviar</button>
        <button class="btn2">actualizar</button>
        <div id="items"></div>
    </main>
    <script>
        const btn = document.querySelector(".btn");
        const updateBtn = document.querySelector(".btn2")
        localStorage.setItem("nombre", JSON.stringify(["carlos", "juan"]));
        btn.addEventListener("click", ()=>{
            const items = JSON.parse(localStorage.getItem("nombre"));
            items.forEach(element => {
                const newElement = document.createElement("div");
                newElement.textContent = element;
                document.getElementById("items").appendChild(
                    newElement
                )
            });
        })

        updateBtn.addEventListener("click", ()=>{
            const items = JSON.parse(localStorage.getItem("nombre"));
            const nameVal = document.querySelector(".nombre").value;
            localStorage.setItem("nombre", JSON.stringify([...items, nameVal]))
        })

    </script>
</body>
</html>
